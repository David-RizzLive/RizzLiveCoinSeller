<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizz Live — Coin-Sellers Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#F5A623; --gold-l:#FFF8E7; --gold-d:#C8841A;
  --bg:#FAFAF8; --surf:#FFFFFF; --surf2:#F5F3EE;
  --bd:rgba(0,0,0,0.08); --bd2:rgba(0,0,0,0.13);
  --tx:#1A1816; --tx2:#6B6560; --tx3:#A09890;
  --r:18px; --rsm:10px;
  --sh:0 2px 14px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --shh:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}

#cc{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;}

header{position:relative;z-index:10;background:var(--surf);border-bottom:1px solid var(--bd);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:66px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;display:flex;align-items:center;gap:9px;color:var(--tx);text-decoration:none;}
.logo-coin{width:33px;height:33px;background:linear-gradient(145deg,#FFD166,#F5A623);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(245,166,35,.4);animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.logo span{color:var(--tx);}
.logo em{font-style:normal;color:var(--gold);}
.hbadge{background:var(--gold-l);color:var(--gold-d);font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;border:1px solid rgba(245,166,35,.22);}

main{position:relative;z-index:5;max-width:1200px;margin:0 auto;padding:2.5rem 2rem 4rem;}

.hero{text-align:center;margin-bottom:2.5rem;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(26px,4vw,42px);font-weight:800;line-height:1.15;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--gold);}
.hero p{color:var(--tx2);font-size:15px;max-width:460px;margin:0 auto;}

.sbar{margin-bottom:2rem;}
.sw{position:relative;max-width:480px;margin:0 auto;}
.sw svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;}
.sw input{width:100%;height:46px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--surf);padding:0 16px 0 42px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--tx);outline:none;transition:border-color .18s,box-shadow .18s;box-shadow:var(--sh);}
.sw input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,.12);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:20px;}

.card{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:0;box-shadow:var(--sh);transition:box-shadow .22s,transform .22s,border-color .22s;position:relative;overflow:hidden;}
.card:hover{box-shadow:var(--shh);transform:translateY(-3px);border-color:rgba(245,166,35,.28);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#FFD166,#F5A623,#FFD166);background-size:200%;opacity:0;transition:opacity .22s;animation:shim 2.5s linear infinite;}
@keyframes shim{0%{background-position:0%}100%{background-position:200%}}
.card:hover::before{opacity:1;}

.cbody{padding:18px 20px 16px;}
.ctop{display:flex;align-items:flex-start;gap:13px;margin-bottom:14px;}
.avatar{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#FFF3D6,#FFD166);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--gold-d);flex-shrink:0;border:1px solid rgba(245,166,35,.22);}
.avatar img{width:46px;height:46px;border-radius:13px;object-fit:cover;}
.cinfo{flex:1;min-width:0;}
.cname{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.cid{font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:4px;}
.bdgs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:22px;}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
.bm{background:#EEF2FF;color:#4338CA;border:1px solid #C7D2FE;}
.bs{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}
.bf{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0;}
.bv{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;}
.cacts{display:flex;gap:8px;}
.bwa{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#25D366;color:#fff;border:none;border-radius:var(--rsm);height:40px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .18s,transform .12s;}
.bwa:hover{background:#1aad53;transform:scale(1.02);}

.empty{text-align:center;padding:4rem 2rem;color:var(--tx2);grid-column:1/-1;}
.empty .ei{font-size:46px;margin-bottom:14px;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:#1A1816;color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:all .26s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:600px){header{padding:0 1rem;}main{padding:1.5rem 1rem 3rem;}}
</style>
</head>
<body>

<canvas id="cc"></canvas>
<div class="toast" id="toast"></div>

<header>
  <div class="logo">
    <div class="logo-coin">🪙</div>
    <span>Rizz</span><em>Live</em>
  </div>
  <div class="hbadge" id="hbadge">0 Resellers</div>
</header>

<main>
  <div class="hero">
    <h1><em>Coin-Sellers</em></h1>
    <p>Browse verified Rizz Live coin resellers — all in one place.</p>
  </div>

  <div class="sbar">
    <div class="sw">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="sq" placeholder="Search by name or Rizz Live ID…" oninput="render()">
    </div>
  </div>

  <div class="grid" id="grid"></div>
</main>

<!-- data.js is the shared file generated by admin and committed to GitHub -->
<script src="data.js"></script>
<script>
const BCFG={
  merchant:{l:'Merchant',e:'🏪',c:'bm'},
  seller:  {l:'Coin-Seller',e:'💰',c:'bs'},
  fast:    {l:'Fast Delivery',e:'⚡',c:'bf'},
  verified:{l:'Verified',e:'✓',c:'bv'},
};

/* data.js sets window.RIZZ_DATA — fall back to empty if missing */
let data = (typeof RIZZ_DATA !== 'undefined') ? RIZZ_DATA : [];

function ini(n){return n.trim().split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdgH(k){const b=BCFG[k];return b?`<span class="bdg ${b.c}">${b.e} ${b.l}</span>`:''; }

function render(){
  const q = document.getElementById('sq').value.toLowerCase();
  const list = data.filter(r =>
    r.name.toLowerCase().includes(q) || r.rizzId.toLowerCase().includes(q)
  );
  document.getElementById('hbadge').textContent = data.length + ' Reseller' + (data.length !== 1 ? 's' : '');
  const g = document.getElementById('grid');
  if(!list.length){
    g.innerHTML='<div class="empty"><div class="ei">🔍</div><p>No resellers found.</p></div>';
    return;
  }
  g.innerHTML = list.map(r => {
    const wa = 'https://wa.me/' + r.phone.replace(/[^0-9]/g,'');
    const avatarEl = r.img
      ? `<div class="avatar"><img src="${esc(r.img)}" alt="avatar"></div>`
      : `<div class="avatar">${ini(r.name)}</div>`;
    return `<div class="card">
      <div class="cbody">
        <div class="ctop">
          ${avatarEl}
          <div class="cinfo">
            <div class="cname">${esc(r.name)}</div>
            <div class="cid">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
              ${esc(r.rizzId)}
            </div>
          </div>
        </div>
        <div class="bdgs">${r.badges.map(bdgH).join('') || '<span style="font-size:12px;color:var(--tx3)">No badges</span>'}</div>
        <div class="cacts">
          <a class="bwa" href="${wa}" target="_blank" rel="noopener">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.557 4.118 1.532 5.845L0 24l6.335-1.51A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.005-1.373l-.357-.213-3.758.896.938-3.658-.234-.376A9.818 9.818 0 1112 21.818z"/></svg>
            Chat on WhatsApp
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function cp(p){navigator.clipboard.writeText(p).then(()=>showToast('📋 Number copied!'));}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* coin rain */
const cv=document.getElementById('cc'),cx=cv.getContext('2d');
let coins=[];
function rs(){cv.width=innerWidth;cv.height=innerHeight;}rs();addEventListener('resize',rs);
function mk(){return{x:Math.random()*cv.width,y:-20,r:5+Math.random()*7,vy:.35+Math.random()*.7,vx:(Math.random()-.5)*.4,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.04,a:.25+Math.random()*.45,col:Math.random()>.5?'#FFD166':'#F5A623'};}
for(let i=0;i<10;i++){const c=mk();c.y=Math.random()*innerHeight;coins.push(c);}
function draw(c){cx.save();cx.globalAlpha=c.a;cx.translate(c.x,c.y);cx.rotate(c.rot);const sx=Math.max(.15,Math.abs(Math.cos(c.rot*1.5)));cx.scale(sx,1);cx.beginPath();cx.arc(0,0,c.r,0,Math.PI*2);cx.fillStyle=c.col;cx.fill();cx.beginPath();cx.arc(0,0,c.r*.55,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,.2)';cx.fill();cx.restore();}
(function loop(){cx.clearRect(0,0,cv.width,cv.height);coins.forEach((c,i)=>{c.y+=c.vy;c.x+=c.vx;c.rot+=c.vr;draw(c);if(c.y>cv.height+20)coins[i]=mk();});requestAnimationFrame(loop);})();

render();
</script>
</body>
</html>
