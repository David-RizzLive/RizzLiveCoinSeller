<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#FFFBF0"/>
<title>Rizz Live — Official Coin Sellers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold-1:#C8860A; --gold-2:#E8A020; --gold-3:#F5C842; --gold-4:#FDE68A;
  --gold-deep:#7A4F00; --gold-shine:#FFF3B0;
  --wa:#25D366; --wa-dk:#128C7E;
  --bg:#FFFBF0; --bg2:#FFF8E7; --bg3:#FEF3C7;
  --card:#FFFFFF; --card-edge:#FFF9F0;
  --border:#E8D090; --border-2:#D4AA50;
  --txt:#1A1000; --txt2:#3D2A00; --muted:#8A6F30;
  --accent:#B45309;
  --r:24px; --pad:clamp(16px,4vw,28px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}

/* ══ COIN RAIN CANVAS ══ */
#rainCanvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
  opacity:0.55;
}

/* ══ BACKGROUND ATMOSPHERE ══ */
.bg-atm{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 20% 15%,#FDE68A44 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%,#FCD34D33 0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 75% 10%,#F59E0B1A 0%,transparent 50%),
    radial-gradient(ellipse 80% 30% at 10% 90%,#FDE68A2A 0%,transparent 50%),
    var(--bg);
}
.bg-dots{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(circle,#C8860A14 1px,transparent 1px),
    radial-gradient(circle,#E8A02008 1.5px,transparent 1.5px);
  background-size:30px 30px,60px 60px;
  background-position:0 0,15px 15px;
}

/* ══ WRAP ══ */
.wrap{position:relative;z-index:2}

/* ══ HEADER ══ */
header{
  text-align:center;
  padding:clamp(40px,7vw,80px) var(--pad) clamp(24px,4vw,44px);
  position:relative;
}
.hd-crown{
  font-size:clamp(36px,6vw,56px);
  display:inline-block;
  filter:drop-shadow(0 4px 16px #C8860A70);
  margin-bottom:8px;
  animation:crown-bob 3.5s ease-in-out infinite;
}
@keyframes crown-bob{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}
@media(prefers-reduced-motion:reduce){.hd-crown{animation:none}}

.hd-eyebrow{
  font-family:'Cinzel',serif;
  font-size:clamp(8px,1.5vw,11px);
  letter-spacing:8px;
  color:var(--gold-1);
  text-transform:uppercase;
  margin-bottom:10px;
  opacity:.85;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(48px,10vw,110px);
  font-weight:900;
  line-height:.9;
  letter-spacing:-2px;
  background:linear-gradient(150deg,
    var(--gold-3) 0%,
    var(--gold-1) 30%,
    var(--gold-deep) 55%,
    var(--gold-1) 75%,
    var(--gold-3) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  background-size:200% auto;
  animation:gold-shift 5s linear infinite;
  filter:drop-shadow(0 2px 0 #C8860A20);
}
@keyframes gold-shift{
  0%{background-position:0% center}
  100%{background-position:200% center}
}
.hd-sub{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(11px,2vw,15px);
  font-weight:400;
  letter-spacing:4px;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:10px;
}
.hd-sub em{color:var(--accent);font-style:normal;font-weight:600}

.divider{
  height:1px;
  margin:clamp(20px,3vw,36px) auto 0;
  max-width:480px;
  background:linear-gradient(90deg,transparent,var(--gold-3),var(--gold-1),var(--gold-3),transparent);
  position:relative;
}
.divider::before,.divider::after{
  content:'◆';
  position:absolute;top:50%;
  transform:translateY(-50%);
  color:var(--gold-2);
  font-size:10px;
  background:var(--bg);
  padding:0 6px;
}
.divider::before{left:calc(50% - 50px)}
.divider::after{right:calc(50% - 50px)}

/* ══ SEARCH ══ */
.search-wrap{
  max-width:500px;margin:clamp(22px,4vw,40px) auto clamp(8px,2vw,16px);
  padding:0 var(--pad);
}
.search-inner{
  position:relative;
  display:flex;align-items:center;
}
.search-ico{
  position:absolute;left:18px;
  font-size:16px;pointer-events:none;
  opacity:.5;
}
.search-wrap input{
  width:100%;
  padding:14px 18px 14px 48px;
  border-radius:50px;
  border:1.5px solid var(--border);
  background:rgba(255,255,255,0.85);
  color:var(--txt);
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:500;
  outline:none;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:0 2px 12px #C8860A10,inset 0 1px 0 #FFFFFF90;
  transition:border-color .25s,box-shadow .25s;
}
.search-wrap input::placeholder{color:var(--muted);opacity:.65}
.search-wrap input:focus{
  border-color:var(--gold-1);
  box-shadow:0 0 0 4px #C8860A18,0 2px 12px #C8860A18,inset 0 1px 0 #FFFFFF90;
}

/* ══ GRID SECTION ══ */
.grid-section{
  max-width:680px;margin:0 auto;
  padding:0 var(--pad) clamp(60px,8vw,100px);
}
.count-bar{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:5px;
  color:var(--muted);text-align:center;
  text-transform:uppercase;
  margin-bottom:clamp(20px,3vw,34px);
}
.count-bar strong{color:var(--gold-1)}

.sellers-grid{display:grid;gap:clamp(20px,3vw,32px)}

/* ══ CARD ══ */
.card{
  background:linear-gradient(175deg,#FFFFFF 0%,#FFF9EC 100%);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:clamp(22px,3vw,36px) clamp(18px,3vw,32px) clamp(18px,3vw,28px);
  display:flex;flex-direction:column;align-items:center;
  gap:clamp(12px,2vw,18px);
  position:relative;overflow:hidden;
  box-shadow:
    0 1px 0 #FFFFFF inset,
    0 4px 20px #C8860A10,
    0 1px 4px #C8860A0A;
  transition:transform .35s cubic-bezier(.22,1,.36,1),
             box-shadow .35s,border-color .35s;
  opacity:0;
  animation:card-in .6s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(28px) scale(.96)}
  to{opacity:1;transform:none}
}
@media(prefers-reduced-motion:reduce){.card{animation:none;opacity:1}}
.card:hover{
  transform:translateY(-6px) scale(1.012);
  box-shadow:
    0 1px 0 #FFFFFF inset,
    0 16px 48px #C8860A22,
    0 0 0 1.5px #C8860A50,
    0 2px 6px #C8860A18;
  border-color:var(--border-2);
}

/* top accent bar */
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold-3),var(--gold-1),var(--gold-3),transparent);
  opacity:0;transition:opacity .35s;
}
.card:hover::before{opacity:1}

/* glow blob */
.card-glow{
  position:absolute;
  top:-30%;left:50%;transform:translateX(-50%);
  width:160%;height:200px;
  background:radial-gradient(ellipse,#F5C84218 0%,transparent 70%);
  pointer-events:none;opacity:0;transition:opacity .4s;
}
.card:hover .card-glow{opacity:1}

/* shine sweep */
.card-shine{
  position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 35%,#FFFFFF70 50%,transparent 65%);
  transform:translateX(-120%);pointer-events:none;
  border-radius:var(--r);
}
.card:hover .card-shine{
  transform:translateX(120%);
  transition:transform .6s ease;
}

/* badge */
.badge{
  position:absolute;top:14px;right:14px;
  background:linear-gradient(135deg,var(--gold-2),var(--gold-1));
  color:#FFFBF0;
  font-family:'Cinzel',serif;
  font-size:8px;font-weight:700;letter-spacing:2px;
  padding:4px 11px;border-radius:50px;
  text-transform:uppercase;
  box-shadow:0 2px 10px #C8860A40;
}

/* ══ AVATAR ══ */
.av-wrap{
  position:relative;
  width:clamp(88px,12vw,120px);
  height:clamp(88px,12vw,120px);
  flex-shrink:0;
}
.av-ring-outer{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(
    var(--gold-3) 0deg,
    var(--gold-1) 90deg,
    var(--gold-deep) 180deg,
    var(--gold-1) 270deg,
    var(--gold-3) 360deg);
  animation:ring-spin 5s linear infinite;
  will-change:transform;
}
@keyframes ring-spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.av-ring-outer{animation:none}}
.av-ring-inner{
  position:absolute;inset:-1px;border-radius:50%;
  background:var(--bg);
}
.av-img{
  position:absolute;inset:4px;
  width:calc(100% - 8px);height:calc(100% - 8px);
  border-radius:50%;
  object-fit:cover;object-position:center;
  background:#F5ECD9;z-index:1;
}
.av-init{
  position:absolute;inset:4px;
  width:calc(100% - 8px);height:calc(100% - 8px);
  border-radius:50%;
  display:none;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#FDE68A,#F59E0B);
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,4vw,34px);font-weight:900;
  color:var(--gold-deep);z-index:1;
}

/* ══ SELLER NAME ══ */
.s-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,3vw,26px);
  font-weight:700;
  color:var(--txt2);
  text-align:center;
  line-height:1.15;
  letter-spacing:.3px;
}

/* ══ PILLS ══ */
.info-row{display:flex;flex-direction:column;gap:8px;width:100%}
.pill{
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#FFFDF7,#FFF8E8);
  border:1px solid #ECD89A;
  border-radius:12px;
  padding:clamp(7px,1.2vw,10px) clamp(12px,2vw,18px);
  font-size:clamp(12px,1.8vw,14px);
  font-weight:500;
  color:var(--txt);
}
.pill-icon{font-size:16px;flex-shrink:0}
.pill-lbl{
  font-size:9px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  flex-shrink:0;white-space:nowrap;
  font-family:'Cinzel',serif;
}
.pill-val{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}

/* ══ ID ROW for multiple IDs ══ */
.id-pills{display:flex;gap:6px;flex-wrap:wrap}
.id-chip{
  background:linear-gradient(135deg,#FEF9EC,#FEF3C7);
  border:1px solid #E8D090;
  border-radius:8px;
  padding:4px 12px;
  font-size:12px;font-weight:700;
  color:var(--gold-deep);
  font-family:'Cinzel',serif;
  letter-spacing:1px;
}

/* ══ WHATSAPP BUTTONS ══ */
.wa-group{display:flex;gap:10px;width:100%;flex-wrap:wrap}
.wa-btn{
  flex:1;min-width:140px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:clamp(11px,1.8vw,14px) 12px;
  border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--wa-dk),var(--wa));
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:clamp(12px,1.6vw,14px);font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  position:relative;overflow:hidden;
  box-shadow:0 3px 16px #25D36640;
  transition:filter .2s,transform .15s,box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.wa-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#ffffff25,transparent);
  opacity:0;transition:opacity .2s;
}
.wa-btn:hover{filter:brightness(1.1);transform:scale(1.03);box-shadow:0 6px 24px #25D36660}
.wa-btn:hover::after{opacity:1}
.wa-btn:active{transform:scale(.97)}
.wa-name{font-size:10px;opacity:.8;display:block;margin-top:1px;text-transform:none;letter-spacing:0}
.wa-btn-inner{display:flex;flex-direction:column;align-items:center;gap:0}
.wa-svg{width:18px;height:18px;flex-shrink:0}

/* ══ EMPTY STATE ══ */
.empty{
  display:none;text-align:center;
  padding:clamp(50px,10vw,90px) 20px;
  color:var(--muted);
}
.empty-icon{font-size:clamp(40px,7vw,60px);display:block;margin-bottom:14px;opacity:.5}
.empty p{font-size:15px;letter-spacing:1px}

/* ══ FOOTER ══ */
footer{
  text-align:center;
  padding:clamp(20px,3vw,32px) var(--pad) clamp(32px,5vw,52px);
  border-top:1px solid var(--border);
  color:var(--muted);font-size:12px;letter-spacing:2px;
  position:relative;z-index:2;
}
footer strong{color:var(--gold-1);font-weight:600}

@supports(padding:max(0px)){
  body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  footer{padding-bottom:max(clamp(32px,5vw,52px),env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<canvas id="rainCanvas" aria-hidden="true"></canvas>
<div class="bg-atm" aria-hidden="true"></div>
<div class="bg-dots" aria-hidden="true"></div>

<div class="wrap">

<header>
  <div class="hd-crown" aria-hidden="true">👑</div>
  <p class="hd-eyebrow">Official Verified Directory</p>
  <h1>Rizz Live<br>Coin Sellers</h1>
  <p class="hd-sub">Premium Resellers &nbsp;·&nbsp; <em>Instant Delivery</em> &nbsp;·&nbsp; Verified</p>
  <div class="divider"></div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-ico" aria-hidden="true">🔍</span>
    <input
      type="search" id="searchInput"
      placeholder="Search seller or Rizz ID…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      aria-label="Search sellers"
    />
  </div>
</div>

<section class="grid-section" aria-label="Verified Coin Sellers">
  <p class="count-bar">Showing <strong id="countNum">0</strong> Verified Sellers</p>
  <div class="sellers-grid" id="sellersGrid" role="list"></div>
  <div class="empty" id="emptyState" role="status" aria-live="polite">
    <span class="empty-icon">🔍</span>
    <p>No sellers found matching your search.</p>
  </div>
</section>

<footer>
  &copy; 2026 <strong>Rizz Live</strong> &nbsp;·&nbsp; All coin sellers are independently verified.
</footer>

</div><!-- /wrap -->

<script>
/* ══════════════════════════════════════════════
   COIN RAIN CANVAS
══════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('rainCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, coins;

  const COIN_COLORS = [
    ['#F5C842','#C8860A'],
    ['#FDE68A','#E8A020'],
    ['#FFD700','#B8860B'],
    ['#F59E0B','#92400E'],
    ['#FCD34D','#D97706'],
  ];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeCoin(){
    const pair = COIN_COLORS[Math.floor(Math.random()*COIN_COLORS.length)];
    return {
      x     : Math.random()*W,
      y     : -20 - Math.random()*H*0.5,
      r     : 6 + Math.random()*10,
      vy    : 1.2 + Math.random()*2.2,
      vx    : (Math.random()-.5)*0.6,
      tilt  : Math.random()*Math.PI*2,
      tSpeed: (Math.random()-.5)*0.06,
      light : pair[0],
      dark  : pair[1],
      alpha : 0.55 + Math.random()*0.3,
    };
  }

  function init(){
    resize();
    const count = Math.min(55, Math.floor(W/18));
    coins = [];
    for(let i=0;i<count;i++){
      const c = makeCoin();
      c.y = Math.random()*H; // pre-distribute
      coins.push(c);
    }
  }

  function drawCoin(c){
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.globalAlpha = c.alpha;

    const scaleX = Math.cos(c.tilt);
    const r = c.r;

    // coin body (ellipse)
    ctx.scale(scaleX, 1);
    const grad = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
    grad.addColorStop(0, c.light);
    grad.addColorStop(0.6, c.dark);
    grad.addColorStop(1, '#7A4F00');
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();

    // shine
    ctx.beginPath();
    ctx.arc(-r*0.25,-r*0.25,r*0.4,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    // edge rim
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle = c.light;
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.restore();
  }

  function tick(){
    ctx.clearRect(0,0,W,H);
    for(const c of coins){
      c.y += c.vy;
      c.x += c.vx;
      c.tilt += c.tSpeed;
      if(c.y > H+30){
        Object.assign(c, makeCoin());
        c.y = -20;
      }
      drawCoin(c);
    }
    requestAnimationFrame(tick);
  }

  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    canvas.style.display='none'; return;
  }

  window.addEventListener('resize', ()=>{ resize(); });
  init();
  tick();
})();

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   BUILD CARD
══════════════════════════════════════════════ */
function makeCard(s, idx){
  const initials = (s.name.replace(/[^A-Za-z]/g,'').slice(0,2) || '??').toUpperCase();

  const card = document.createElement('article');
  card.className = 'card';
  card.setAttribute('role','listitem');
  card.style.animationDelay = `${(idx*0.1).toFixed(2)}s`;

  // IDs row
  const idHtml = s.rizzIds.map(id =>
    `<span class="id-chip"># ${id}</span>`
  ).join('');

  // Avatar src
  const avatarSrc = s.img ? `data:image/png;base64,${s.img}` : '';

  // WhatsApp buttons
  const waBtnsHtml = s.contacts.map(c => {
    const msg  = `Hi ${encodeURIComponent(s.name)}, I want to buy Rizz Live Coins!`;
    const link = `https://wa.me/${c.phone}?text=${msg}`;
    return `<a class="wa-btn" href="${link}" target="_blank" rel="noopener noreferrer"
      aria-label="Chat with ${c.label} from ${s.name} on WhatsApp">
      ${WA_SVG}
      <span class="wa-btn-inner">
        <span>WhatsApp</span>
        <span class="wa-name">${c.label} · ${c.display}</span>
      </span>
    </a>`;
  }).join('');

  // Contact info pill (show first contact's number, or all if single)
  const contactPills = s.contacts.map(c =>
    `<div class="pill">
      <span class="pill-icon">📞</span>
      <span class="pill-lbl">${c.label}</span>
      <span class="pill-val">${c.display}</span>
    </div>`
  ).join('');

  card.innerHTML =
    `<div class="card-glow"></div>` +
    `<div class="card-shine"></div>` +
    (s.badge ? `<span class="badge">${s.badge}</span>` : '') +
    `<div class="av-wrap">
      <div class="av-ring-outer"></div>
      <div class="av-ring-inner"></div>
      ${avatarSrc
        ? `<img class="av-img" src="${avatarSrc}" alt="${s.name} profile"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>`
        : ''}
      <div class="av-init" aria-hidden="true" style="${avatarSrc?'':'display:flex'}">${initials}</div>
    </div>` +
    `<div class="s-name">${s.name}</div>` +
    `<div class="info-row">
      <div class="pill">
        <span class="pill-icon">🎮</span>
        <span class="pill-lbl">Rizz&nbsp;ID</span>
        <span class="pill-val"><div class="id-pills">${idHtml}</div></span>
      </div>
      ${contactPills}
    </div>` +
    `<div class="wa-group">${waBtnsHtml}</div>`;

  // click anywhere → first WA link
  const firstLink = `https://wa.me/${s.contacts[0].phone}?text=Hi%20${encodeURIComponent(s.name)}%2C%20I%20want%20to%20buy%20Rizz%20Live%20Coins!`;
  card.addEventListener('click', e => {
    if(!e.target.closest('.wa-btn')) window.open(firstLink,'_blank','noopener,noreferrer');
  });

  return card;
}

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
const grid    = document.getElementById('sellersGrid');
const emptyEl = document.getElementById('emptyState');
const countEl = document.getElementById('countNum');

function render(data){
  while(grid.firstChild) grid.removeChild(grid.firstChild);
  countEl.textContent = data.length;
  if(!data.length){ emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';
  const frag = document.createDocumentFragment();
  data.forEach((s,i) => frag.appendChild(makeCard(s,i)));
  grid.appendChild(frag);
}

let debTimer;
document.getElementById('searchInput').addEventListener('input', function(){
  clearTimeout(debTimer);
  debTimer = setTimeout(()=>{
    const q = this.value.toLowerCase().trim();
    if(!q){ render(SELLERS); return; }
    render(SELLERS.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.rizzIds.some(id => id.includes(q))
    ));
  }, 220);
});

render(SELLERS);
