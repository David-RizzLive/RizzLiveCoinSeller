<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#FFF8EE"/>
  <title>Rizz Live Coin-Sellers</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════
       LIGHT DESIGN TOKENS
    ══════════════════════════════════════ */
    :root{
      --gold:#C8860A;   --gold-lt:#E8A020;  --gold-dk:#8B5E06;
      --coin:#D97706;   --coin-lt:#F59E0B;  --accent:#0284C7;

      --bg:#FFF8EE;
      --bg2:#FFF3E0;
      --card:#FFFFFF;
      --card2:#FFFAF3;

      --border:#E8D5B0;
      --border-hover:#C8860A;
      --shadow:0 2px 12px #C8860A18;
      --shadow-hover:0 10px 36px #C8860A28, 0 0 0 1.5px #C8860A40;

      --txt:#1C1409;
      --txt2:#3D2B0E;
      --muted:#7A6040;

      --wa:#25D366; --wa2:#128C7E;

      --r:20px;
      /* ── SINGLE COLUMN always ── */
      --cols:1; --gap:22px; --pad:20px;
    }

    *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0 }
    html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth }
    body{
      font-family:'Rajdhani',sans-serif;
      background:var(--bg); color:var(--txt);
      min-height:100vh; overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    a{ text-decoration:none; color:inherit }
    img{ display:block; max-width:100% }

    .bg-layer{
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse at 15% 20%, #FDE68A55 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, #FCD34D33 0%, transparent 45%),
        radial-gradient(ellipse at 80% 10%, #FBBF2422 0%, transparent 40%),
        radial-gradient(ellipse at 10% 90%, #FDE68A33 0%, transparent 45%),
        var(--bg);
      transform:translateZ(0);
    }
    .bg-layer::after{
      content:'';
      position:absolute; inset:0;
      background-image:radial-gradient(circle, #C8860A18 1px, transparent 1px);
      background-size:28px 28px;
      pointer-events:none;
    }

    .fc{
      position:fixed; pointer-events:none; z-index:0;
      opacity:.12; will-change:transform,opacity;
      animation:fc-rise linear infinite;
    }
    @keyframes fc-rise{
      0%  { transform:translateY(106vh) rotate(0deg);   opacity:0   }
      8%  { opacity:.12 }
      92% { opacity:.12 }
      100%{ transform:translateY(-8vh)  rotate(360deg); opacity:0   }
    }
    @media(prefers-reduced-motion:reduce){ .fc{ display:none } }

    .wrap{ position:relative; z-index:1 }

    header{
      text-align:center;
      padding:clamp(32px,6vw,56px) var(--pad) clamp(20px,4vw,32px);
    }
    .hd-divider{
      height:2px; margin-top:clamp(18px,3vw,30px);
      background:linear-gradient(90deg,transparent,var(--gold-lt),var(--coin),var(--gold-lt),transparent);
      animation:div-pulse 3s ease-in-out infinite;
    }
    @keyframes div-pulse{ 0%,100%{opacity:.4} 50%{opacity:1} }

    .hd-icon{
      font-size:clamp(34px,7vw,50px);
      display:inline-block;
      filter:drop-shadow(0 2px 8px #C8860A55);
      animation:coin-flip 5s ease-in-out infinite;
      will-change:transform;
    }
    @keyframes coin-flip{
      0%,100%{ transform:rotateY(0deg)   }
      45%    { transform:rotateY(180deg) }
      50%    { transform:rotateY(180deg) }
      95%    { transform:rotateY(360deg) }
    }
    @media(prefers-reduced-motion:reduce){ .hd-icon{ animation:none } }

    .hd-tag{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(8px,1.8vw,12px);
      letter-spacing:5px; color:var(--coin);
      text-transform:uppercase; opacity:.9; margin:6px 0 4px;
    }
    h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(42px,10vw,100px);
      line-height:.95; letter-spacing:2px;
      background:linear-gradient(135deg,var(--coin-lt) 0%,var(--gold) 45%,var(--gold-dk) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 1px 0 #C8860A30);
    }
    .hd-sub{
      font-size:clamp(12px,2.5vw,18px);
      color:var(--muted); letter-spacing:3px;
      text-transform:uppercase; margin-top:8px;
    }
    .hd-sub b{ color:var(--accent); font-weight:500 }

    .search-box{
      max-width:460px; margin:0 auto clamp(10px,2vw,18px);
      padding:0 var(--pad);
    }
    .search-box input{
      width:100%;
      padding:clamp(11px,2vw,14px) clamp(16px,3vw,22px);
      border-radius:50px;
      border:1.5px solid var(--border);
      background:#FFFFFFCC; color:var(--txt);
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(14px,2vw,16px); font-weight:500;
      outline:none;
      box-shadow:0 2px 8px #C8860A12;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
      transition:border-color .25s, box-shadow .25s;
    }
    .search-box input::placeholder{ color:var(--muted); opacity:.7 }
    .search-box input:focus{
      border-color:var(--gold);
      box-shadow:0 0 0 3px #C8860A20, 0 2px 8px #C8860A15;
    }

    .grid-wrap{
      max-width:600px; margin:0 auto;
      padding:0 var(--pad) clamp(40px,6vh,72px);
    }
    .count-label{
      font-family:'Orbitron',sans-serif;
      font-size:11px; letter-spacing:4px;
      color:var(--muted); text-align:center;
      margin-bottom:clamp(16px,2.5vw,26px);
      text-transform:uppercase;
    }
    .count-label strong{ color:var(--gold) }

    .sellers-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:var(--gap);
    }

    /* ══════════════════════════════════════
       SELLER CARD
    ══════════════════════════════════════ */
    .card{
      background:linear-gradient(160deg,var(--card) 0%,var(--card2) 100%);
      border:1.5px solid var(--border);
      border-radius:var(--r);
      padding:clamp(18px,3vw,28px) clamp(14px,2.5vw,22px) clamp(14px,2.5vw,20px);
      display:flex; flex-direction:column; align-items:center;
      gap:clamp(8px,1.5vw,12px);
      position:relative; overflow:hidden; cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .3s cubic-bezier(.22,1,.36,1),
                 border-color .3s, box-shadow .3s;
      opacity:0; animation:card-in .5s forwards;
      will-change:transform;
    }
    @keyframes card-in{
      from{ opacity:0; transform:translateY(22px) scale(.97) }
      to  { opacity:1; transform:translateY(0)    scale(1)   }
    }
    @media(prefers-reduced-motion:reduce){ .card{ animation:none; opacity:1 } }

    .card:hover{
      transform:translateY(-5px) scale(1.015);
      border-color:var(--border-hover);
      box-shadow:var(--shadow-hover);
    }

    .card-glow{
      position:absolute; inset:0; border-radius:var(--r);
      background:radial-gradient(ellipse at 50% -10%,#F59E0B18 0%,transparent 65%);
      opacity:0; transition:opacity .3s; pointer-events:none;
    }
    .card:hover .card-glow{ opacity:1 }

    .card-shine{
      position:absolute; top:0; left:0; width:55%; height:100%;
      background:linear-gradient(108deg,transparent 40%,#FFFFFF60 50%,transparent 60%);
      transform:translateX(-110%);
      pointer-events:none; border-radius:var(--r);
    }
    .card:hover .card-shine{
      transform:translateX(280%);
      transition:transform .55s ease;
    }

    .badge{
      position:absolute; top:12px; right:12px;
      background:linear-gradient(135deg,var(--coin-lt),var(--gold));
      color:#fff;
      font-family:'Orbitron',sans-serif;
      font-size:clamp(7px,1.2vw,9px); font-weight:700;
      letter-spacing:1px; padding:3px 9px;
      border-radius:50px; text-transform:uppercase; white-space:nowrap;
      box-shadow:0 2px 8px #C8860A40;
    }

    .av-wrap{
      position:relative;
      width:clamp(70px,10vw,96px);
      height:clamp(70px,10vw,96px);
      flex-shrink:0;
    }
    .av-ring{
      position:absolute; inset:-3px; border-radius:50%;
      background:conic-gradient(var(--coin-lt),var(--gold),var(--coin),var(--coin-lt));
      animation:ring-spin 4s linear infinite;
      will-change:transform;
    }
    @keyframes ring-spin{ to{ transform:rotate(360deg) } }
    @media(prefers-reduced-motion:reduce){ .av-ring{ animation:none } }

    .av-bg{ position:absolute; inset:0; border-radius:50%; background:#FFF8EE }
    .av-img,.av-init{ position:absolute; inset:3px; border-radius:50% }
    .av-img{ object-fit:cover; background:#F5ECD9 }
    .av-init{
      display:none; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#FDE68A,#FCD34D);
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(20px,4vw,32px); color:var(--gold-dk);
    }

    .s-name{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(15px,3vw,22px); letter-spacing:1.5px;
      color:var(--txt2); text-align:center;
      line-height:1.1; word-break:break-word;
    }

    .info-row{ display:flex; flex-direction:column; gap:6px; width:100% }
    .pill{
      display:flex; align-items:center; gap:8px;
      background:#FFF3E0; border:1px solid #E8D5B0;
      border-radius:10px;
      padding:clamp(5px,1vw,7px) clamp(10px,2vw,14px);
      font-size:clamp(11px,1.8vw,14px); font-weight:500;
      letter-spacing:.3px; overflow:hidden; color:var(--txt);
    }
    .pill-icon{ font-size:15px; flex-shrink:0; line-height:1 }
    .pill-lbl{
      font-size:clamp(8px,1.2vw,10px); color:var(--muted);
      letter-spacing:1px; text-transform:uppercase;
      flex-shrink:0; white-space:nowrap;
    }
    .pill-val{ flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }

    .wa-btn{
      display:flex; align-items:center; justify-content:center; gap:9px;
      width:100%; margin-top:4px;
      padding:clamp(10px,1.8vw,13px) 12px;
      border-radius:14px; border:none; cursor:pointer;
      background:linear-gradient(135deg,var(--wa2),var(--wa));
      color:#fff; font-family:'Rajdhani',sans-serif;
      font-size:clamp(12px,1.8vw,15px); font-weight:700;
      letter-spacing:1px; text-transform:uppercase;
      position:relative; overflow:hidden;
      box-shadow:0 3px 14px #25D36630;
      transition:filter .2s, transform .15s, box-shadow .2s;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    .wa-btn::before{
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,#fff3,transparent);
      opacity:0; transition:opacity .2s;
    }
    .wa-btn:hover{ filter:brightness(1.08); transform:scale(1.025); box-shadow:0 6px 22px #25D36650 }
    .wa-btn:hover::before{ opacity:1 }
    .wa-btn:active{ transform:scale(.97) }
    .wa-svg{ width:18px; height:18px; flex-shrink:0 }

    .empty{
      display:none; text-align:center;
      padding:clamp(40px,8vw,70px) 20px;
      color:var(--muted); font-size:clamp(15px,2vw,18px);
    }
    .empty-icon{ font-size:clamp(36px,6vw,52px); display:block; margin-bottom:12px }

    footer{
      text-align:center;
      padding:clamp(20px,3vw,28px) var(--pad) clamp(28px,5vw,44px);
      border-top:1px solid var(--border);
      color:var(--muted); font-size:13px; letter-spacing:1px;
      position:relative; z-index:1;
    }
    footer b{ color:var(--gold); font-weight:600 }

    @supports(padding:max(0px)){
      body{
        padding-left:env(safe-area-inset-left);
        padding-right:env(safe-area-inset-right);
      }
      footer{ padding-bottom:max(clamp(28px,5vw,44px), env(safe-area-inset-bottom)) }
    }
  </style>
</head>
<body>

<div class="bg-layer" aria-hidden="true"></div>
<div id="fc-host" aria-hidden="true"></div>

<div class="wrap">

  <header>
    <div class="hd-icon" aria-hidden="true">🪙</div>
    <p class="hd-tag">Official Directory</p>
    <h1>Rizz Live<br>Coin-Sellers</h1>
    <p class="hd-sub">Verified Resellers &nbsp;·&nbsp; <b>Instant Delivery</b></p>
    <div class="hd-divider"></div>
  </header>

  <div class="search-box">
    <input
      type="search"
      id="searchInput"
      placeholder="🔍  Search seller or Rizz ID…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      aria-label="Search sellers"
    />
  </div>

  <section class="grid-wrap" aria-label="Coin Sellers">
    <p class="count-label">Showing <strong id="countNum">0</strong> Verified Sellers</p>
    <div class="sellers-grid" id="sellersGrid" role="list"></div>
    <div class="empty" id="emptyState" role="status" aria-live="polite">
      <span class="empty-icon">🔍</span>
      No sellers found matching your search.
    </div>
  </section>

  <footer>
    &copy; 2025 <b>Rizz Live</b> &nbsp;·&nbsp; All coin sellers are independently verified.
  </footer>

</div>

<script>
const SELLERS = [
  { name:"WoodGotCoins",               rizzId:"9663", phone:"17068872696",  phoneDisplay:"+1 (706) 887-2696", badge:"Verified" },
  { name:"JHawkins Talent Agency LLC", rizzId:"411",  phone:"18503172112",  phoneDisplay:"+1 (850) 317-2112", badge:"Verified" },
];

/* ── Floating coins ── */
(function(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const host  = document.getElementById('fc-host');
  const icons = ['🪙','💰','🏅','⭐','✨'];
  const count = window.innerWidth < 500 ? 5 : 10;
  const frag  = document.createDocumentFragment();
  for(let i = 0; i < count; i++){
    const el = document.createElement('span');
    el.className   = 'fc';
    el.textContent = icons[i % icons.length];
    el.style.cssText =
      `left:${(Math.random()*95).toFixed(1)}vw;` +
      `font-size:${(12+Math.random()*14).toFixed(1)}px;` +
      `animation-duration:${(13+Math.random()*18).toFixed(1)}s;` +
      `animation-delay:${(Math.random()*18).toFixed(1)}s`;
    frag.appendChild(el);
  }
  host.appendChild(frag);
})();

const WA_SVG =
  `<svg class="wa-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">` +
  `<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>` +
  `<path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.528 5.862L.057 23.994l6.306-1.652A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.016-1.378l-.36-.214-3.733.979 1-3.638-.234-.374A9.818 9.818 0 1 1 12 21.818z"/>` +
  `</svg>`;

function makeCard(s, idx){
  const initials = (s.name.replace(/[^A-Za-z]/g,'').slice(0,2) || '??').toUpperCase();
  const waLink   = `https://wa.me/${s.phone}?text=Hi%20${encodeURIComponent(s.name)}%2C%20I%20want%20to%20buy%20Rizz%20Live%20Coins!`;

  const card = document.createElement('article');
  card.className = 'card';
  card.setAttribute('role','listitem');
  card.style.animationDelay = `${(idx*0.07).toFixed(2)}s`;

  card.innerHTML =
    `<div class="card-glow"></div>` +
    `<div class="card-shine"></div>` +
    (s.badge ? `<span class="badge">${s.badge}</span>` : '') +
    `<div class="av-wrap">` +
      `<div class="av-ring"></div>` +
      `<div class="av-bg"></div>` +
      `<img class="av-img" src="${s.name}.png" alt="${s.name} profile" loading="lazy" decoding="async"` +
        ` onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` +
      `<div class="av-init" aria-hidden="true">${initials}</div>` +
    `</div>` +
    `<div class="s-name">${s.name}</div>` +
    `<div class="info-row">` +
      `<div class="pill"><span class="pill-icon">🎮</span>` +
        `<span class="pill-lbl">Rizz&nbsp;ID</span>` +
        `<span class="pill-val">${String(s.rizzId).replace(/^RIZZ#/i,'')}</span></div>` +
      `<div class="pill"><span class="pill-icon">📞</span>` +
        `<span class="pill-lbl">Contact</span>` +
        `<span class="pill-val">${s.phoneDisplay||'+'+s.phone}</span></div>` +
    `</div>` +
    `<a class="wa-btn" href="${waLink}" target="_blank" rel="noopener noreferrer"` +
       ` aria-label="Chat with ${s.name} on WhatsApp">${WA_SVG}Chat on WhatsApp</a>`;

  card.addEventListener('click', e => {
    if(!e.target.closest('.wa-btn')) window.open(waLink,'_blank','noopener,noreferrer');
  });
  return card;
}

const grid    = document.getElementById('sellersGrid');
const emptyEl = document.getElementById('emptyState');
const countEl = document.getElementById('countNum');

function render(data){
  while(grid.firstChild) grid.removeChild(grid.firstChild);
  countEl.textContent = data.length;
  if(!data.length){ emptyEl.style.display='block'; return; }
  emptyEl.style.display='none';
  const frag = document.createDocumentFragment();
  data.forEach((s,i) => frag.appendChild(makeCard(s,i)));
  grid.appendChild(frag);
}

let debTimer;
document.getElementById('searchInput').addEventListener('input', function(){
  clearTimeout(debTimer);
  debTimer = setTimeout(()=>{
    const q = this.value.toLowerCase().trim();
    render(q ? SELLERS.filter(s=>s.name.toLowerCase().includes(q)||s.rizzId.toLowerCase().includes(q)) : SELLERS);
  }, 220);
});

render(SELLERS);
</script>
</body>
</html>
